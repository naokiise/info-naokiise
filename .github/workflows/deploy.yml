name: Deploy to naokiise.com/info

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-info
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.repository == 'naokiise/info-naokiise'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-info
          path: dist-info

      - name: Deploy to naokiise.github.io
        env:
          GH_TOKEN: ${{ secrets.NAOKIISE_SITE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "NAOKIISE_SITE_TOKEN is not set. Skipping deploy."
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/naokiise/naokiise.github.io.git" site
          rm -rf site/info
          cp -r dist-info site/info
          touch site/.nojekyll
          cd site
          git add info .nojekyll
          if git diff --staged --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Deploy info site to /info"
          git push origin main
